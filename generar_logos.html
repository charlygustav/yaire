<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generando Recursos...</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; flex-direction: column; text-align: center; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #a1a1aa; }
        canvas { display: none; }
    </style>
</head>
<body>
    <h1>Generando Logo y Favicon definitivos...</h1>
    <p>Por favor espera un segundo. Las descargas comenzarán automáticamente.</p>
    <p id="status" style="color: #4ade80; font-weight: bold; margin-top: 20px;"></p>

    <canvas id="canvas"></canvas>

    <script>
        window.onload = async () => {
            await document.fonts.ready;
            setTimeout(generateLogos, 800);
        };

        function generateLogos() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            function draw(width, height, fontSize, yOffset, filename) {
                canvas.width = width;
                canvas.height = height;
                
                // Siempre limpia el fondo para que sea TRANSPARENTE
                ctx.clearRect(0, 0, width, height);
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                
                // Siempre color BLANCO
                ctx.fillStyle = '#ffffff'; 
                ctx.font = "900 " + fontSize + "px 'Inter', sans-serif";
                
                if (ctx.letterSpacing !== undefined) {
                    ctx.letterSpacing = "-2px";
                }
                
                // Dibuja las letras
                ctx.fillText("28E", width / 2, height / 2 + yOffset);

                // Descarga
                const link = document.createElement('a');
                link.download = filename;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            }

            // 1. Logo principal (Requerimiento: < 400x200)
            // Lo hacemos de 380x180 para estar un pelín debajo del límite y súper seguros.
            draw(380, 180, 110, 6, 'Logo-Uptime-Transparente.png');
            
            // 2. Favicon (Requerimiento: < 96x96)
            // Aumentamos la fuente de 36 a 60 para que ocupe todo el espacio y se vea bien en la pestaña
            setTimeout(() => {
                draw(96, 96, 60, 4, 'Favicon-Uptime-Transparente.png');
                document.getElementById('status').innerText = "¡Los 2 archivos definitivos han sido descargados!";
            }, 1000);
        }
    </script>
</body>
</html>
